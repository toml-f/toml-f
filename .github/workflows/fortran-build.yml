name: CI

on: [push, pull_request]

env:
  BUILD_DIR: _build
  PIP_PACKAGES: >-
    meson!=1.8.0
    cmake
    ninja
    gcovr

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build-type: [debug]
        toolchain:
          - {compiler: gcc, version: '12', build: meson}
          - {compiler: gcc, version: '12', build: cmake}

        include:
        - os: ubuntu-latest
          build-type: coverage
          toolchain: {compiler: gcc, version: '10', build: meson}

        - os: ubuntu-latest
          build-type: debug
          toolchain: {compiler: gcc, version: '11', build: meson}

        - os: ubuntu-latest
          build-type: debug
          toolchain: {compiler: gcc, version: '13', build: meson}

        - os: ubuntu-24.04-arm
          build-type: debug
          toolchain: {compiler: gcc, version: '14', build: meson}

        - os: ubuntu-latest
          build-type: debug
          toolchain: {compiler: gcc, version: '14', build: meson}

        - os: ubuntu-latest
          build-type: debug
          toolchain: {compiler: gcc, version: '12', build: fpm}

        - os: ubuntu-latest
          build-type: debug
          toolchain: {compiler: nvidia-hpc, version: '26.1', build: meson}

        - os: ubuntu-latest
          build-type: debug
          toolchain: {compiler: intel, version: '2025.2', build: meson}

        - os: ubuntu-latest
          build-type: debug
          toolchain: {compiler: lfortran, version: '0.63.0', build: cmake}

        # os: ubuntu-latest
        # build-type: debug
        # toolchain: {compiler: aocc, version: '5.1.0', build: meson}

        # - os: windows-latest
        #   build: meson
        #   build-type: debug
        #   compiler: gcc
        #   shell: msys2 {0}

    defaults:
      run:
        shell: bash

    env:
      PYTHON_V: 3.9

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_V }}

    - name: Install fpm
      if: ${{ matrix.toolchain.build == 'fpm' }}
      uses: fortran-lang/setup-fpm@v7  # fpm 0.11.0
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Prepare for cache restore
      if: ${{ contains(matrix.toolchain.compiler, 'intel') }}
      run: |
        sudo mkdir -p /opt/intel
        sudo chown $USER /opt/intel

    - name: Cache Intel installation
      if: ${{ contains(matrix.toolchain.compiler, 'intel') }}
      id: cache-install
      uses: actions/cache@v4
      with:
        path: /opt/intel/oneapi
        key: install-${{ matrix.toolchain.compiler }}-${{ matrix.toolchain.version }}-${{ matrix.os }}

    - name: Install GCC Compiler
      if: ${{ matrix.toolchain.compiler != 'intel' }}
      uses: fortran-lang/setup-fortran@v1
      with:
        compiler: ${{ matrix.toolchain.compiler }}
        version: ${{ matrix.toolchain.version }}

    - name: Install Intel Compiler (Linux)
      if: ${{ contains(matrix.toolchain.compiler, 'intel') && steps.cache-install.outputs.cache-hit != 'true' }}
      id: setup-fortran
      uses: fortran-lang/setup-fortran@v1
      with:
        compiler: ${{ matrix.toolchain.compiler }}
        version: ${{ matrix.toolchain.version }}

    - name: Setup Intel oneAPI environment
      if: ${{ contains(matrix.toolchain.compiler, 'intel') }}
      run: |
        source /opt/intel/oneapi/setvars.sh --force
        printenv >> $GITHUB_ENV

    - name: Setup environment for Fortran and C compilers
      run: |
        if [ ! -n "$FC" ]; then
          FC=${{ steps.setup-fortran.outputs.fc }}
          CC=${{ steps.setup-fortran.outputs.cc }}
          if [ "${{ matrix.toolchain.compiler }}" = "gcc" ]; then
            FC="gfortran"
            CC="gcc"
          elif [ "${{ matrix.toolchain.compiler }}" = "intel" ]; then
            FC="ifx"
            CC="icx"
          elif [ "${{ matrix.toolchain.compiler }}" = "intel-classic" ]; then
            FC="ifort"
            CC="icc"
          fi
          echo "FC=$FC" >> $GITHUB_ENV
          echo "CC=$CC" >> $GITHUB_ENV
        fi

    - name: Install build and test dependencies
      if: ${{ ! contains(matrix.os, 'windows') }}
      run: pip3 install ${{ env.PIP_PACKAGES }} ${{ env.PIP_EXTRAS }}

    - name: Install toml-test v2.2.0 for compliance tests
      if: ${{ matrix.toolchain.build == 'meson' && ! contains(matrix.os, 'windows') }}
      run: |
        set -euo pipefail

        mkdir -p "$HOME/.local/bin"
        arch="$(uname -m)"

        case "${RUNNER_OS}" in
          Linux)
            case "$arch" in
              x86_64) asset="toml-test-v2.2.0-linux-amd64.gz" ;;
              aarch64|arm64) asset="toml-test-v2.2.0-linux-arm64.gz" ;;
              armv7l|armv6l) asset="toml-test-v2.2.0-linux-arm.gz" ;;
              *) echo "Unsupported Linux architecture: $arch" >&2; exit 1 ;;
            esac
            ;;
          macOS)
            case "$arch" in
              x86_64) asset="toml-test-v2.2.0-darwin-amd64.gz" ;;
              arm64) asset="toml-test-v2.2.0-darwin-arm64.gz" ;;
              *) echo "Unsupported macOS architecture: $arch" >&2; exit 1 ;;
            esac
            ;;
          *)
            echo "Unsupported runner OS: ${RUNNER_OS}" >&2
            exit 1
            ;;
        esac

        curl -fsSL -o "$RUNNER_TEMP/toml-test.gz" \
          "https://github.com/toml-lang/toml-test/releases/download/v2.2.0/${asset}"
        gzip -dc "$RUNNER_TEMP/toml-test.gz" > "$HOME/.local/bin/toml-test"
        chmod +x "$HOME/.local/bin/toml-test"

        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Configure build (meson)
      if: ${{ matrix.toolchain.build == 'meson' }}
      run: >-
        meson setup ${{ env.BUILD_DIR }}
        --buildtype=debug
        --prefix=$PWD/_dist
        --libdir=lib
        --warnlevel=0
        -Db_coverage=${{ env.COVERAGE }}
        -Dtest_drive:qp=disable
        -Dtest_drive:xdp=disable
        ${{ env.MESON_ARGS }}
      env:
        COVERAGE: ${{ matrix.build-type == 'coverage' }}
        MESON_ARGS: >-
          ${{ contains(matrix.os, 'windows') && '-Dfortran_link_args=-Wl,--allow-multiple-definition' || '' }}

    - name: Configure build (CMake)
      if: ${{ matrix.toolchain.build == 'cmake' }}
      run: >-
        cmake -B${{ env.BUILD_DIR }}
        -GNinja
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_INSTALL_PREFIX=$PWD/_dist
        -DCMAKE_INSTALL_LIBDIR=lib

    - name: Build library (fpm)
      if: ${{ matrix.toolchain.build == 'fpm' }}
      run: |
        fpm --version
        fpm build

    - name: Build library
      if: ${{ matrix.toolchain.build != 'fpm' }}
      run: ninja -C ${{ env.BUILD_DIR }}

    - name: Run unit tests (fpm)
      if: ${{ matrix.toolchain.build == 'fpm' }}
      run: fpm test

    - name: Run unit tests (meson)
      if: ${{ matrix.toolchain.build == 'meson' }}
      run: >-
         meson test
         -C ${{ env.BUILD_DIR }}
         --print-errorlogs
         --no-rebuild
         --num-processes 1
         --suite toml-f
         -t 2
      env:
        OMP_NUM_THREADS: 1,2,1

    - name: Run unit tests (ctest)
      if: ${{ matrix.toolchain.build == 'cmake' }}
      run: |
         ctest --output-on-failure --parallel 2 -R '^toml-f/'
      working-directory: ${{ env.BUILD_DIR }}
      env:
        OMP_NUM_THREADS: 1,2,1

    - name: Create coverage report
      if: ${{ matrix.toolchain.build == 'meson' && matrix.build-type == 'coverage' }}
      run:
         ninja -C ${{ env.BUILD_DIR }} coverage

    - name: Install project
      if: ${{ matrix.toolchain.build != 'fpm' }}
      run: |
        ninja -C ${{ env.BUILD_DIR }} install
        echo "TOMLF_PREFIX=$PWD/_dist" >> $GITHUB_ENV

    - name: Discover installed files (CMake)
      if: ${{ matrix.toolchain.build != 'fpm' }}
      run: |
        cmake -S test/export -B ${{ env.BUILD_DIR }}/discover-cmake -G Ninja -DCMAKE_PREFIX_PATH=$PWD/_dist/lib/cmake
        cmake --build ${{ env.BUILD_DIR }}/discover-cmake

    - name: Discover installed files (Meson)
      if: ${{ matrix.toolchain.build != 'fpm' && matrix.toolchain.compiler != 'lfortran' }}
      run: |
        meson setup ${{ env.BUILD_DIR }}/discover-meson test/export --pkg-config-path=$PWD/_dist/lib/pkgconfig
        meson compile -C ${{ env.BUILD_DIR }}/discover-meson

    - name: Upload coverage report
      if: ${{ matrix.toolchain.build == 'meson' && matrix.build-type == 'coverage' }}
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
